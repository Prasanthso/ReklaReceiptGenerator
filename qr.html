<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan & Fill</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root {
            --ink: #1c2b28;
            --paper: #f6f4ee;
            --line: #1c2b28;
            --moss: #3a5a49;
            --moss-dark: #28402f;
            --brass: #b98a3d;
            --danger: #a3402f;
            --mono: "IBM Plex Mono", "Courier New", monospace;
            --sans: "IBM Plex Sans", "Helvetica Neue", Arial, sans-serif;
        }

        @font-face {
            font-family: "IBM Plex Sans";
            src: local("Arial");
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--paper);
            background-image:
                linear-gradient(var(--paper), var(--paper)),
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(28, 43, 40, 0.05) 39px, rgba(28, 43, 40, 0.05) 40px);
            color: var(--ink);
            font-family: var(--sans);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 48px 20px;
        }

        .sheet {
            width: 100%;
            max-width: 560px;
        }

        .eyebrow {
            font-family: var(--mono);
            font-size: 12px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--moss);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .eyebrow::before {
            content: "";
            width: 22px;
            height: 2px;
            background: var(--brass);
            display: inline-block;
        }

        h1 {
            font-family: var(--sans);
            font-weight: 800;
            font-size: 34px;
            letter-spacing: -0.01em;
            margin: 0 0 6px 0;
        }

        .sub {
            font-size: 14.5px;
            color: #4b5a55;
            margin: 0 0 34px 0;
            max-width: 44ch;
            line-height: 1.5;
        }

        .field {
            border: 1.5px solid var(--line);
            background: #fffdf8;
            margin-bottom: 20px;
            position: relative;
            transition: box-shadow .15s ease, transform .15s ease;
        }

        .field.filled {
            box-shadow: inset 4px 0 0 var(--moss);
        }

        .field.active {
            box-shadow: inset 4px 0 0 var(--brass);
        }

        .field-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 0 16px;
        }

        .field-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #6b7873;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label .num {
            color: var(--ink);
            font-weight: 700;
        }

        .status-tag {
            font-family: var(--mono);
            font-size: 10.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #8a958f;
        }

        .status-tag.ok {
            color: var(--moss);
            font-weight: 700;
        }

        .field-body {
            display: flex;
            align-items: stretch;
            gap: 0;
            padding: 8px 10px 12px 16px;
        }

        .field-body input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: var(--mono);
            font-size: 16px;
            color: var(--ink);
            padding: 8px 6px;
            outline: none;
            min-width: 0;
        }

        .field-body input::placeholder {
            color: #a9b2ac;
        }

        .scan-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1.5px solid var(--ink);
            background: var(--paper);
            color: var(--ink);
            font-family: var(--mono);
            font-size: 11.5px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 10px 14px;
            cursor: pointer;
            transition: background .12s ease, color .12s ease;
        }

        .scan-btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        .scan-btn:active {
            transform: translateY(1px);
        }

        .scan-btn.scanning {
            background: var(--brass);
            border-color: var(--brass);
            color: #fff;
        }

        .scan-btn svg {
            display: block;
            flex-shrink: 0;
        }

        /* scanner panel */
        .scanner {
            display: none;
            margin: 0 16px 16px 16px;
            border: 1.5px dashed var(--moss);
            background: #0e1a16;
            position: relative;
            overflow: hidden;
        }

        .scanner.open {
            display: block;
        }

        .scanner video {
            width: 100%;
            display: block;
            max-height: 280px;
            object-fit: cover;
        }

        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 58%;
            aspect-ratio: 1/1;
            transform: translate(-50%, -50%);
            border: 2px solid var(--brass);
            box-shadow: 0 0 0 999px rgba(14, 26, 22, 0.35);
            pointer-events: none;
        }

        .reticle::before,
        .reticle::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
        }

        .scan-line {
            position: absolute;
            left: 21%;
            right: 21%;
            height: 2px;
            background: var(--brass);
            box-shadow: 0 0 8px var(--brass);
            animation: sweep 1.8s ease-in-out infinite;
        }

        @keyframes sweep {

            0%,
            100% {
                top: 22%;
            }

            50% {
                top: 78%;
            }
        }

        .scanner-msg {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #d9d3c2;
            padding: 9px 12px;
            background: #0e1a16;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .scanner-error {
            font-family: var(--mono);
            font-size: 12px;
            color: #f0d5cc;
            padding: 16px;
            line-height: 1.5;
        }

        .submit-row {
            margin-top: 32px;
            padding-top: 22px;
            border-top: 1.5px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .progress-note {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.06em;
            color: #6b7873;
        }

        .progress-note b {
            color: var(--ink);
        }

        .submit-btn {
            border: none;
            background: var(--moss-dark);
            color: #f6f4ee;
            font-family: var(--sans);
            font-weight: 700;
            font-size: 15px;
            padding: 15px 30px;
            cursor: pointer;
            letter-spacing: 0.01em;
            transition: background .12s ease, transform .12s ease;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--ink);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            background: #cfd4cd;
            color: #8a958f;
            cursor: not-allowed;
        }

        .toast {
            margin-top: 18px;
            border: 1.5px solid var(--moss);
            background: #eef4ee;
            color: var(--moss-dark);
            font-family: var(--mono);
            font-size: 12.5px;
            padding: 14px 16px;
            display: none;
        }

        .toast.show {
            display: block;
        }

        .toast .k {
            color: #6b7873;
            display: inline-block;
            width: 90px;
        }

        canvas {
            display: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .scan-line {
                animation: none;
                top: 50%;
            }
        }
    </style>
</head>

<body>

    <div class="sheet">
        <div class="eyebrow">Field intake</div>
        <h1>Scan &amp; fill</h1>
        <p class="sub">Pick a field, scan its QR code with your camera, and the value drops straight in. Do both, then
            submit.</p>

        <!-- FIELD 1 -->
        <div class="field" id="field-1">
            <div class="field-head">
                <div class="field-label"><span class="num">01</span> First value</div>
                <div class="status-tag" id="status-1">Empty</div>
            </div>
            <div class="field-body">
                <input type="text" id="input-1" placeholder="Scan or type…" autocomplete="off">
                <button class="scan-btn" id="btn-1" data-target="1">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <line x1="14" y1="14" x2="14" y2="21"></line>
                        <line x1="21" y1="14" x2="21" y2="21"></line>
                        <line x1="17.5" y1="14" x2="17.5" y2="17.5"></line>
                        <line x1="14" y1="17.5" x2="21" y2="17.5"></line>
                    </svg>
                    Scan
                </button>
            </div>
            <div class="scanner" id="scanner-1">
                <video id="video-1" playsinline autoplay muted></video>
                <div class="reticle"></div>
                <div class="scan-line"></div>
                <div class="scanner-msg">Point camera at QR code — searching…</div>
            </div>
        </div>

        <!-- FIELD 2 -->
        <div class="field" id="field-2">
            <div class="field-head">
                <div class="field-label"><span class="num">02</span> Second value</div>
                <div class="status-tag" id="status-2">Empty</div>
            </div>
            <div class="field-body">
                <input type="text" id="input-2" placeholder="Scan or type…" autocomplete="off">
                <button class="scan-btn" id="btn-2" data-target="2">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                        <line x1="14" y1="14" x2="14" y2="21"></line>
                        <line x1="21" y1="14" x2="21" y2="21"></line>
                        <line x1="17.5" y1="14" x2="17.5" y2="17.5"></line>
                        <line x1="14" y1="17.5" x2="21" y2="17.5"></line>
                    </svg>
                    Scan
                </button>
            </div>
            <div class="scanner" id="scanner-2">
                <video id="video-2" playsinline autoplay muted></video>
                <div class="reticle"></div>
                <div class="scan-line"></div>
                <div class="scanner-msg">Point camera at QR code — searching…</div>
            </div>
        </div>

        <div class="submit-row">
            <div class="progress-note"><b id="progress-count">0</b>/2 fields filled</div>
            <button class="submit-btn" id="submit-btn" disabled>Submit values</button>
        </div>

        <div class="toast" id="toast">
            <div><span class="k">FIRST</span><span id="toast-1"></span></div>
            <div><span class="k">SECOND</span><span id="toast-2"></span></div>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        (function () {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const streams = { 1: null, 2: null };
            const rafIds = { 1: null, 2: null };

            function setStatus(id, text, ok) {
                const el = document.getElementById('status-' + id);
                el.textContent = text;
                el.classList.toggle('ok', !!ok);
            }

            function updateProgress() {
                const v1 = document.getElementById('input-1').value.trim();
                const v2 = document.getElementById('input-2').value.trim();
                const count = (v1 ? 1 : 0) + (v2 ? 1 : 0);
                document.getElementById('progress-count').textContent = count;
                document.getElementById('submit-btn').disabled = count < 2;
            }

            function markFieldState(id) {
                const field = document.getElementById('field-' + id);
                const val = document.getElementById('input-' + id).value.trim();
                field.classList.toggle('filled', !!val);
                if (val) setStatus(id, 'Captured', true);
                updateProgress();
            }

            ['input-1', 'input-2'].forEach((elId, idx) => {
                document.getElementById(elId).addEventListener('input', () => markFieldState(idx + 1));
            });

            async function startScan(id) {
                const btn = document.getElementById('btn-' + id);
                const scannerPanel = document.getElementById('scanner-' + id);
                const video = document.getElementById('video-' + id);
                const field = document.getElementById('field-' + id);

                // if already scanning this one, stop it
                if (streams[id]) {
                    stopScan(id);
                    return;
                }
                // stop the other scanner if open
                const other = id === 1 ? 2 : 1;
                if (streams[other]) stopScan(other);

                scannerPanel.classList.add('open');
                field.classList.add('active');
                btn.classList.add('scanning');
                btn.textContent = '';
                btn.innerHTML = 'Stop';
                setStatus(id, 'Requesting camera…');

                // getUserMedia only exists on secure contexts (https:// or localhost).
                // A plain file:// page or a non-https server will fail here every time.
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    scannerPanel.innerHTML = '<div class="scanner-error">This browser/page can\'t access the camera here. Camera access requires a secure context (https:// or localhost) — it will not work opened directly as a local file. Serve the page over https or localhost, or type the value directly.</div>';
                    setStatus(id, 'Camera unavailable');
                    btn.classList.remove('scanning');
                    btn.innerHTML = 'Scan';
                    field.classList.remove('active');
                    return;
                }

                async function tryGetStream() {
                    // Prefer the rear camera; fall back to any camera (common on laptops/desktops).
                    try {
                        return await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
                    } catch (e1) {
                        return await navigator.mediaDevices.getUserMedia({ video: true });
                    }
                }

                try {
                    const stream = await tryGetStream();
                    streams[id] = stream;
                    video.srcObject = stream;
                    video.muted = true;
                    video.setAttribute('playsinline', '');
                    try {
                        await video.play();
                    } catch (playErr) {
                        // Some browsers need a user gesture again after srcObject changes; ignore and let autoplay attribute handle it.
                    }
                    setStatus(id, 'Scanning…');
                    tick(id);
                } catch (err) {
                    let hint = err && err.name ? err.name : (err.message || 'permission denied');
                    let advice = 'Check browser camera permissions and try again, or type the value directly.';
                    if (hint === 'NotAllowedError') advice = 'Camera permission was denied. Allow camera access for this page in your browser settings, then try again.';
                    if (hint === 'NotFoundError') advice = 'No camera was found on this device.';
                    if (hint === 'NotReadableError') advice = 'The camera is already in use by another app or tab.';
                    scannerPanel.innerHTML = '<div class="scanner-error">Camera unavailable (' + hint + '). ' + advice + '</div>';
                    setStatus(id, 'Camera blocked');
                    btn.classList.remove('scanning');
                    btn.innerHTML = 'Scan';
                    field.classList.remove('active');
                }
            }

            function stopScan(id) {
                const stream = streams[id];
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    streams[id] = null;
                }
                if (rafIds[id]) {
                    cancelAnimationFrame(rafIds[id]);
                    rafIds[id] = null;
                }
                document.getElementById('scanner-' + id).classList.remove('open');
                document.getElementById('field-' + id).classList.remove('active');
                const btn = document.getElementById('btn-' + id);
                btn.classList.remove('scanning');
                btn.innerHTML = 'Scan';
                const val = document.getElementById('input-' + id).value.trim();
                setStatus(id, val ? 'Captured' : 'Empty', !!val);
            }

            function tick(id) {
                const video = document.getElementById('video-' + id);
                if (!streams[id]) return;

                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    if (typeof jsQR === 'undefined') {
                        document.getElementById('scanner-' + id).innerHTML = '<div class="scanner-error">QR library failed to load. Check your internet connection and reload the page.</div>';
                        stopScan(id);
                        return;
                    }
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'dontInvert'
                    });
                    if (code && code.data) {
                        const input = document.getElementById('input-' + id);
                        input.value = code.data;
                        markFieldState(id);
                        stopScan(id);
                        return;
                    }
                }
                rafIds[id] = requestAnimationFrame(() => tick(id));
            }

            document.getElementById('btn-1').addEventListener('click', () => startScan(1));
            document.getElementById('btn-2').addEventListener('click', () => startScan(2));

            document.getElementById('submit-btn').addEventListener('click', () => {
                const v1 = document.getElementById('input-1').value.trim();
                const v2 = document.getElementById('input-2').value.trim();
                document.getElementById('toast-1').textContent = v1;
                document.getElementById('toast-2').textContent = v2;
                document.getElementById('toast').classList.add('show');
            });

            window.addEventListener('beforeunload', () => {
                stopScan(1);
                stopScan(2);
            });
        })();
    </script>

</body>

</html>
